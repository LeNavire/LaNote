<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Civildesign</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script
      id="MathJax-script"
      async
      src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"
    ></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap");

      body {
        font-family: "Inter", sans-serif;
        background-color: #f8fafc;
        color: #0f172a;
      }

      .card {
        background: white;
        border-radius: 0.75rem;
        border: 1px solid #e2e8f0;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
      }

      .input-cell {
        background: #f1f5f9;
        border: 1px solid #cbd5e1;
        border-radius: 0.375rem;
        padding: 0.25rem;
        width: 100%;
        text-align: center;
        font-family: "JetBrains Mono", monospace;
        font-size: 0.875rem;
      }

      .input-global {
        background: #f8fafc;
        border: 1px solid #cbd5e1;
        border-radius: 0.375rem;
        padding: 0.25rem 0.5rem;
        width: 80px;
        text-align: center;
        font-family: "JetBrains Mono", monospace;
        font-weight: bold;
      }

      /* Optimisation PDF A4 */
      @media print {
        .no-print {
          display: none !important;
        }
      }

      .pdf-exporting .no-print {
        display: none !important;
      }

      .pdf-exporting .input-cell,
      .pdf-exporting .input-global,
      .pdf-exporting input {
        border: none !important;
        background: transparent !important;
        padding: 0 !important;
        font-weight: 600 !important;
      }

      .pdf-exporting #report-content {
        width: 750px !important;
        margin: 0 auto !important;
        padding: 0 !important;
      }

      .pdf-exporting .card {
        border-radius: 0.5rem !important;
        margin-bottom: 0.75rem !important;
      }

      .pdf-exporting h1 {
        font-size: 1.25rem !important;
      }
      .pdf-exporting table {
        font-size: 0.75rem !important;
      }
    </style>
  </head>
  <body class="p-4">
    <!-- Écran de connexion -->
    <div
      id="login-screen"
      class="fixed inset-0 z-[100] bg-slate-100 flex flex-col items-center justify-center p-4"
    >
      <div
        class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-200"
      >
        <div class="text-center mb-8">
          <div
            class="bg-blue-600 p-3 rounded-xl shadow-lg shadow-blue-200 inline-block mb-4"
          >
            <i class="fas fa-building-shield text-white text-2xl"></i>
          </div>
          <h2 class="text-2xl font-black text-slate-800">
            CIVILDESIGN <span class="text-blue-600">PRO</span>
          </h2>
          <p
            class="text-xs text-slate-500 font-bold uppercase tracking-widest mt-1"
          >
            Accès Restreint
          </p>
        </div>

        <form onsubmit="handleLogin(event)" class="space-y-4">
          <div>
            <label class="block text-sm font-bold text-slate-700 mb-1"
              >Nom d'utilisateur</label
            >
            <input
              type="text"
              id="login-user"
              class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
              placeholder="khaled"
              required
            />
          </div>
          <div>
            <label class="block text-sm font-bold text-slate-700 mb-1"
              >Mot de passe</label
            >
            <input
              type="password"
              id="login-pass"
              class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
              placeholder="codezeta"
              required
            />
          </div>

          <p
            id="login-error"
            class="text-red-500 text-xs font-bold text-center hidden"
          >
            Identifiants incorrects. Veuillez réessayer.
          </p>

          <button
            type="submit"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-lg transition duration-200 shadow-md"
          >
            Se Connecter
          </button>
        </form>
      </div>
    </div>

    <script>
      // Variable globale pour stocker les étages
      let floors = [];

      function calculate() {
        const R = parseFloat(document.getElementById("val-r").value) || 1;
        const Qf = parseFloat(document.getElementById("val-qf").value) || 1;
        const ratio = R / Qf;

        document.getElementById("val-ratio").innerText = ratio.toFixed(3);

        const tbody = document.getElementById("floorTable");
        tbody.innerHTML = "";

        let maxDeltaValue = 0;
        let maxDeltaLevel = "-";
        let isGlobalConforme = true;

        let delta_k_minus_1 = 0; // Déplacement du niveau inférieur (0 pour la base)

        floors.forEach((f, index) => {
          // Calcul Eq 4.15
          const delta_k = ratio * f.dek;

          // Calcul Eq 4.16
          const Delta_k = delta_k - delta_k_minus_1;

          // Limite (1% de hk en cm. hk est en m, donc hk * 100 * 0.01 = hk)
          const limite = f.hk; // 1% de (hk en mètres convertis en cm) donne la même valeur numérique

          const isConforme = Delta_k <= limite;
          if (!isConforme) isGlobalConforme = false;

          if (Delta_k > maxDeltaValue) {
            maxDeltaValue = Delta_k;
            maxDeltaLevel = f.name;
          }

          let statusColor = isConforme
            ? "text-emerald-600 font-bold"
            : "text-red-600 font-black";
          let label = isConforme ? "OK" : "NON CONFORME";

          const row = document.createElement("tr");
          row.innerHTML = `
            <td class="py-2 px-1"><input type="text" value="${f.name}" oninput="updateFloor(${f.id},'name',this.value)" class="text-center w-full font-bold outline-none bg-transparent"></td>
            <td class="py-2 px-1"><input type="number" step="0.01" value="${f.hk}" oninput="updateFloor(${f.id},'hk',this.value)" class="input-cell w-16 mx-auto"></td>
            <td class="py-2 px-1"><input type="number" step="0.01" value="${f.dek}" oninput="updateFloor(${f.id},'dek',this.value)" class="input-cell w-16 mx-auto"></td>
            <td class="py-2 px-1 bg-slate-50 font-mono font-medium">${delta_k.toFixed(3)}</td>
            <td class="py-2 px-1 bg-indigo-50 font-mono font-bold text-indigo-700">${Delta_k.toFixed(3)}</td>
            <td class="py-2 px-1 font-mono text-slate-500">${limite.toFixed(2)}</td>
            <td class="py-2 px-1"><span class="${statusColor}">${label}</span></td>
            <td class="no-print py-2 px-1"><button onclick="removeRow(${f.id})" class="text-slate-300 hover:text-red-500 flex justify-center w-full"><i data-lucide="x-circle" class="w-4 h-4"></i></button></td>
          `;
          tbody.appendChild(row);

          // Préparation pour l'itération suivante
          delta_k_minus_1 = delta_k;
        });

        document.getElementById("maxDelta").innerText =
          maxDeltaValue.toFixed(3) + " cm";
        document.getElementById("max-level").innerText = maxDeltaLevel;

        const badge = document.getElementById("globalStatus");
        if (isGlobalConforme) {
          badge.className =
            "py-2 px-4 rounded text-xs font-black uppercase text-center bg-emerald-600 text-white border-emerald-700";
          badge.innerText = "Conforme";
        } else {
          badge.className =
            "py-2 px-4 rounded text-xs font-black uppercase text-center bg-red-600 text-white border-red-700";
          badge.innerText = "Vérification requise";
        }

        lucide.createIcons();
      }





      function handleLogin(event) {
        event.preventDefault(); // Empêche le rechargement de la page
        const user = document.getElementById("login-user").value;
        const pass = document.getElementById("login-pass").value;
        const errorMsg = document.getElementById("login-error");

        // Nouvelles informations de connexion
        if (user === "khaled" && pass === "codezeta") {
          // Redirection automatique vers la page CIVILDESIGN PRO.html
          window.location.href = "CIVILDESIGNPRO.html";
        } else {
          // Affiche un message d'erreur
          errorMsg.classList.remove("hidden");
        }
      }

      function exportToPDF() {
        document.body.classList.add("pdf-exporting");
        const element = document.getElementById("report-content");
        const opt = {
          margin: 10,
          filename: "Note_Deplacements_RPA2024_A4.pdf",
          image: { type: "jpeg", quality: 0.98 },
          html2canvas: { scale: 2, windowWidth: 800 },
          jsPDF: { unit: "mm", format: "a4", orientation: "portrait" },
        };
        html2pdf()
          .set(opt)
          .from(element)
          .save()
          .then(() => {
            document.body.classList.remove("pdf-exporting");
          });
      }

      window.onload = () => {
        const formattedShortDate = new Intl.DateTimeFormat("fr-FR", {
          day: "2-digit",
          month: "2-digit",
          year: "numeric",
        }).format(new Date());

        document.getElementById("current-date").textContent =
          formattedShortDate;

        // Génère le tableau initial basé sur la valeur par défaut de l'input (5)
        generateFloors();
      };
    </script>
  </body>
</html>
